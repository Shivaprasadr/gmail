name: Gmail Inbox Analytics

on:
  # Run after cleanup workflow completes
  workflow_run:
    workflows: ["Gmail Email Cleanup"]
    types:
      - completed
  
  # Also allow weekly schedule (Sundays at 3 AM UTC - after cleanup)
  schedule:
    - cron: '0 3 * * 0'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Maximum pages to process (each page = 500 emails)'
        required: false
        default: '20'
        type: string
      cleanup_old_gists:
        description: 'Delete old gist reports older than N days'
        required: false
        default: '7'
        type: string

jobs:
  analyze-inbox:
    name: Analyze Gmail Inbox Senders
    runs-on: ubuntu-latest
    
    # Only run if cleanup was successful (or manual/scheduled trigger)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    
    # Add timeout to prevent long-running jobs
    timeout-minutes: 45
    
    # Prevent concurrent runs
    concurrency:
      group: gmail-analytics
      cancel-in-progress: false
    
    outputs:
      total_emails: ${{ steps.analytics.outputs.total_emails }}
      unique_senders: ${{ steps.analytics.outputs.unique_senders }}
      gist_url: ${{ steps.analytics.outputs.gist_url }}
      report_date: ${{ steps.analytics.outputs.report_date }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'email-cleanup/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          cd email-cleanup
          npm ci --omit=dev || npm install --omit=dev

      - name: 📊 Run Gmail Analytics
        id: analytics
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          MAX_RESULTS_PER_QUERY: '500'
          MAX_PAGES: ${{ github.event.inputs.max_pages || '20' }}
          RATE_LIMIT_DELAY_MS: '500'
          GIST_CLEANUP_DAYS: ${{ github.event.inputs.cleanup_old_gists || '7' }}
        run: |
          cd email-cleanup
          echo "🚀 Starting Gmail Inbox Analytics..."
          echo "📊 Analyzing all senders in your inbox..."
          echo "🔒 Results will be saved to a PRIVATE GitHub Gist"
          echo ""
          
          node gmail-analytics.js

      - name: 📊 Analytics completed
        if: success()
        run: |
          echo "✅ Gmail inbox analytics completed successfully!"
          echo ""
          echo "📈 Results Summary:"
          echo "   Total Emails: ${{ steps.analytics.outputs.total_emails }}"
          echo "   Unique Senders: ${{ steps.analytics.outputs.unique_senders }}"
          echo ""
          if [ -n "${{ steps.analytics.outputs.gist_url }}" ]; then
            echo "📄 Full CSV Report (Private):"
            echo "   ${{ steps.analytics.outputs.gist_url }}"
            echo ""
            echo "⚠️  The CSV link above is PRIVATE - only you can access it when logged into GitHub."
          fi

      - name: 🚨 Notify on failure
        if: failure()
        run: |
          echo "❌ Gmail analytics failed!"
          echo "Please check the logs and verify:"
          echo "1. Gmail API credentials are valid"
          echo "2. GIST_TOKEN is configured for private CSV storage"
          echo "3. Rate limits are not exceeded"

  # Summary job for workflow outputs visibility
  summary:
    name: Analytics Summary
    runs-on: ubuntu-latest
    needs: analyze-inbox
    if: success()
    
    steps:
      - name: 📋 Display Analytics Summary
        run: |
          echo "## 📊 Gmail Inbox Analytics Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📧 Total Emails | ${{ needs.analyze-inbox.outputs.total_emails }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 👥 Unique Senders | ${{ needs.analyze-inbox.outputs.unique_senders }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Report Date | ${{ needs.analyze-inbox.outputs.report_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ needs.analyze-inbox.outputs.gist_url }}" ]; then
            echo "### 📄 Download Full Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔒 **[Private CSV Report](${{ needs.analyze-inbox.outputs.gist_url }})**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ This link is **private** - only accessible when logged into your GitHub account." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 How to Use" >> $GITHUB_STEP_SUMMARY
            echo "1. Click the link above to view/download the CSV" >> $GITHUB_STEP_SUMMARY
            echo "2. Copy email addresses you want to clean up" >> $GITHUB_STEP_SUMMARY
            echo "3. Add them to your \`SENDER_EMAILS_LIST\` variable" >> $GITHUB_STEP_SUMMARY
          fi
